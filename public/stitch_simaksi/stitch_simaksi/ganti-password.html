<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganti Password</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #555;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
      transition: border 0.2s;
    }

    input[type="password"]:focus {
      border-color: #007bff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    .note {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Ganti Password</h2>
    <form>
      <label for="current">Password Sekarang</label>
      <input type="password" id="current" placeholder="Masukkan password lama" required>

      <label for="new">Password Baru</label>
      <input type="password" id="new" placeholder="Masukkan password baru" required>

      <label for="confirm">Konfirmasi Password Baru</label>
      <input type="password" id="confirm" placeholder="Ulangi password baru" required>

      <button type="submit">Simpan</button>
    </form>
    <div class="note">Pastikan password baru minimal 8 karakter</div>
  </div>

</body>
</html>
